name: Validate Hack-a-Sprint 2026 submission PRs

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "content/hackathons/hack-a-sprint-2026/**"
      - "scripts/validate-hack-a-sprint-submission-pr.cjs"
      - "content/hackathons/hack-a-sprint-2026/submission.schema.json"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate submission PR
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
          GIT_DIFF_RANGE: ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}
        run: node scripts/validate-hack-a-sprint-submission-pr.cjs
