name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]

# Fork PRs use the same workflow; they run with read-only GITHUB_TOKEN and no repo secrets.
# If checks do not appear, a maintainer must approve workflow runs (Settings → Actions → Fork pull requests).
# We do not use pull_request_target with a full checkout of PR code here — that pattern can expose secrets to untrusted code.

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

# Default permissions for all jobs - principle of least privilege
permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run type-check

      - name: Check API.md is up-to-date with contracts
        # Regenerate openapi.json and docs/API.md from the ts-rest contracts.
        # docs/API.md is checked into git; openapi.json is a build artifact.
        # If either contract changed without regenerating the docs, fail loud
        # so the PR author runs `npm run generate:openapi && npm run generate:api-md`.
        run: |
          npm run generate:openapi
          npm run generate:api-md
          if ! git diff --exit-code -- docs/API.md; then
            echo "::error::docs/API.md is out of date. Run 'npm run generate:openapi && npm run generate:api-md' and commit the result."
            exit 1
          fi

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Vulnerability scanning with npm audit
      - name: Run npm audit
        run: npm audit --audit-level=high

      # License compliance check (matches transitive licenses in production deps)
      - name: Check license compliance
        run: |
          npx license-checker --production --excludePackages "@cursor/sdk@1.0.13;@cursor/sdk-darwin-arm64@1.0.13;@cursor/sdk-darwin-x64@1.0.13;@cursor/sdk-linux-arm64@1.0.13;@cursor/sdk-linux-x64@1.0.13;@cursor/sdk-win32-x64@1.0.13" --onlyAllow "MIT;MIT*;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;CC0-1.0;CC-BY-3.0;CC-BY-4.0;Unlicense;0BSD;BlueOak-1.0.0;GPL-3.0-only;GPL-3.0-or-later;Hippocratic-2.1;MPL-2.0;LGPL-3.0-or-later;(BSD-3-Clause OR GPL-2.0);MIT AND ISC" --summary

      # Secrets scanning with gitleaks
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      # Generate SBOM (Software Bill of Materials)
      - name: Generate SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json --output-format json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom
          path: sbom.json
          retention-days: 30

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          CI: true

      - name: Upload coverage reports
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-cursor-boston
          fail_ci_if_error: false
          verbose: true

  firestore-rules:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Firestore rules tests (emulator)
        run: npm run test:rules
        env:
          CI: true

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npm run test:e2e:install -- --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: true
          PW_WORKERS: ${{ vars.PW_WORKERS || '4' }}
          NEXT_PUBLIC_FIREBASE_API_KEY: "test-api-key"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "test-project.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "test-project-id"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "test-project.appspot.com"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:123456789:web:abcdef"
          NEXT_PUBLIC_FIREBASE_DATABASE_URL: "https://test-project.firebaseio.com"

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, firestore-rules, security, e2e]
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate environment variables
        run: npm run validate-env
        env:
          # Use placeholder values for CI - actual values not needed for build validation
          NEXT_PUBLIC_FIREBASE_API_KEY: "test-api-key"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "test-project.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "test-project-id"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "test-project.appspot.com"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:123456789:web:abcdef"
          NEXT_PUBLIC_FIREBASE_DATABASE_URL: "https://test-project.firebaseio.com"

      - name: Build application
        run: npm run build
        env:
          # Use placeholder values for CI build
          NEXT_PUBLIC_FIREBASE_API_KEY: "test-api-key"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "test-project.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "test-project-id"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "test-project.appspot.com"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:123456789:web:abcdef"
          NEXT_PUBLIC_FIREBASE_DATABASE_URL: "https://test-project.firebaseio.com"

      - name: Report bundle size
        run: |
          echo "## Bundle Size Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f .next/analyze/client.html ]; then
            echo "Bundle analyzer reports generated. Download the artifact to inspect." >> "$GITHUB_STEP_SUMMARY"
          fi
          # Parse Next.js build output for page sizes
          if ls .next/server/app/**/*.html 1>/dev/null 2>&1; then
            TOTAL_SIZE=$(du -sh .next/ | cut -f1)
            CLIENT_SIZE=$(du -sh .next/static/ 2>/dev/null | cut -f1 || echo "N/A")
            echo "| Metric | Size |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Total .next/ | $TOTAL_SIZE |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Client static | $CLIENT_SIZE |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Check JS bundle budget (500KB first-load warning)
        run: |
          # Find the largest first-load JS chunks and warn if any exceed 500KB
          OVER_BUDGET=0
          for f in .next/static/chunks/*.js; do
            SIZE=$(wc -c < "$f")
            if [ "$SIZE" -gt 512000 ]; then
              KB=$((SIZE / 1024))
              echo "::warning file=$f::Chunk $(basename $f) is ${KB}KB (budget: 500KB)"
              OVER_BUDGET=1
            fi
          done
          if [ "$OVER_BUDGET" -eq 1 ]; then
            echo "::warning::One or more JS chunks exceed the 500KB budget. Consider code splitting."
          else
            echo "All JS chunks are within the 500KB budget."
          fi

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, firestore-rules, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: cursor-boston:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=build-placeholder
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=build-placeholder.firebaseapp.com
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=build-placeholder
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=build-placeholder.appspot.com
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=000000000000
            NEXT_PUBLIC_FIREBASE_APP_ID=1:000000000000:web:placeholder
            NEXT_PUBLIC_FIREBASE_DATABASE_URL=https://build-placeholder.firebaseio.com

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: cursor-boston:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy scan results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 30
