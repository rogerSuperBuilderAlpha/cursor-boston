# Uses pull_request_target so this runs even when fork workflows need maintainer approval.
# Does not checkout PR code — posts one-time guidance only.

name: Fork PR notice

on:
  pull_request_target:
    branches: [develop]
    types: [opened]

permissions:
  pull-requests: write

jobs:
  welcome:
    if: github.event.pull_request.head.repo.fork == true
    runs-on: ubuntu-latest
    steps:
      - name: Post contributor guidance
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                'Thanks for opening a PR from a fork!',
                '',
                '- **Base branch:** PRs should target `develop` (the default). Production releases go through a separate PR from `develop` → `main`.',
                '- **CI:** If GitHub Actions does not run yet, a maintainer may need to click **Approve and run** for first-time contributors (repository **Actions** settings allow fork workflows).',
                '',
                '**Vercel:** Production deploys run when changes merge to `main` — not on every PR push.',
              ].join('\n'),
            });
