name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read
  id-token: write  # Required for Sigstore keyless signing

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Match CI gates: lint, typecheck, tests + coverage, Firestore rules, validate-env + build
      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run type-check

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          CI: true

      - name: Setup Java (Firestore emulator)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run Firestore rules tests
        run: npm run test:rules
        env:
          CI: true

      - name: Validate environment variables
        run: npm run validate-env
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: "release-build"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "release.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "release-build"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "release.appspot.com"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:release"
          NEXT_PUBLIC_FIREBASE_DATABASE_URL: "https://release.firebaseio.com"

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: "release-build"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "release.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "release-build"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "release.appspot.com"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:release"
          NEXT_PUBLIC_FIREBASE_DATABASE_URL: "https://release.firebaseio.com"

      - name: Generate SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json --output-format json

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@32e3c96f29a6532607f638797455e9e98cfc703d # v4
        with:
          configuration: |
            {
              "categories": [
                {
                  "title": "## 🚀 Features",
                  "labels": ["feature", "enhancement"]
                },
                {
                  "title": "## 🐛 Bug Fixes",
                  "labels": ["bug", "fix"]
                },
                {
                  "title": "## 📚 Documentation",
                  "labels": ["documentation", "docs"]
                },
                {
                  "title": "## 🔧 Maintenance",
                  "labels": ["chore", "maintenance", "dependencies"]
                },
                {
                  "title": "## 🔒 Security",
                  "labels": ["security"]
                }
              ],
              "template": "#{{CHANGELOG}}\n\n**Full Changelog**: #{{RELEASE_DIFF}}\n",
              "pr_template": "- #{{TITLE}} (#{{NUMBER}}) by @#{{AUTHOR}}"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          body: |
            ## What's Changed
            
            ${{ steps.changelog.outputs.changelog }}
            
            ## Installation
            
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd cursor-boston
            git checkout ${{ github.event.inputs.version || github.ref_name }}
            npm install
            ```
            
            See the [README](https://github.com/rogerSuperBuilderAlpha/cursor-boston#readme) for full setup instructions.
          files: |
            sbom.json
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.version || github.ref_name }}"
          cosign sign-blob --yes \
            --output-signature sbom.json.sig \
            --output-certificate sbom.json.cert \
            sbom.json
          gh release upload "$TAG" sbom.json.sig sbom.json.cert \
            --repo "${{ github.repository }}"

  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: release
    if: success()
    
    steps:
      - name: Post release summary
        run: |
          echo "🎉 Release ${{ github.event.inputs.version || github.ref_name }} published successfully!"
          echo "📦 View release: https://github.com/rogerSuperBuilderAlpha/cursor-boston/releases/tag/${{ github.event.inputs.version || github.ref_name }}"
