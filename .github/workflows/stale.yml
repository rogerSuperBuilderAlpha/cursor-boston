name: Stale issues and PRs

on:
  schedule:
    - cron: '30 6 * * 1'  # Every Monday at 06:30 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had activity in the last 90 days. It will be closed in 14 days if no
            further activity occurs. If this issue is still relevant, please
            leave a comment or remove the stale label.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had activity in the last 90 days. It will be closed in 14
            days if no further activity occurs.
          close-issue-message: >
            This issue was closed because it has been stale for 14 days with no
            activity. Feel free to reopen if this is still relevant.
          days-before-stale: 90
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'good first issue,help wanted,security,accessibility'
          exempt-pr-labels: 'security'
          exempt-all-milestones: true
