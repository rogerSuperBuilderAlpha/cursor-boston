changelog:
  exclude:
    labels:
      - stale
    authors:
      - dependabot
      - dependabot[bot]
  categories:
    - title: "New Features"
      labels:
        - feature
        - enhancement
    - title: "Bug Fixes"
      labels:
        - bug
        - fix
    - title: "Security"
      labels:
        - security
    - title: "Accessibility"
      labels:
        - accessibility
    - title: "Documentation"
      labels:
        - documentation
        - docs
    - title: "Maintenance"
      labels:
        - chore
        - maintenance
        - dependencies
    - title: "Other Changes"
      labels:
        - "*"
