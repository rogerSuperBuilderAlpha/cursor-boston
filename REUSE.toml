version = 1
SPDX-PackageName = "cursor-boston"
SPDX-PackageDownloadLocation = "https://github.com/rogerSuperBuilderAlpha/cursor-boston"

# Project-wide default: every source file is GPL-3.0-only under Cursor Boston's
# copyright. Files that have an inline `SPDX-License-Identifier` header
# override this default; the bulk of the codebase will rely on this declaration
# until the one-time backfill script runs (see scripts/add-gpl-headers.js
# header comment and REVIEW_ACTION_PLAN.md Phase 5.5.4).
[[annotations]]
path = ["**.ts", "**.tsx", "**.js", "**.jsx", "**.mjs", "**.cjs"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Cursor Boston"
SPDX-License-Identifier = "GPL-3.0-only"

# Documentation, markdown, configuration. Same license; covered separately
# so the file-glob is explicit.
[[annotations]]
path = ["**.md", "**.json", "**.yml", "**.yaml", "**.toml"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Cursor Boston"
SPDX-License-Identifier = "GPL-3.0-only"

# Generated artifacts — excluded from license tracking. CycloneDX SBOMs
# (generated per release) and the autogenerated OpenAPI spec aren't
# hand-authored; the LICENSE file at the repo root governs the project
# itself, and downstream consumers should look there rather than at
# per-file annotations on these.
[[annotations]]
path = ["public/openapi.json", "docs/API.md", "public/llms.txt"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Cursor Boston"
SPDX-License-Identifier = "GPL-3.0-only"
